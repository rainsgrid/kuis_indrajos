    { kategori: "Minggu 1 Pendahuluan", tipe: "pg", pertanyaan: "Dalam sistem penginderaan jauh, apa yang dimaksud dengan 'Reflect Electromagnetic' (ER)?", pilihan: ["A. Gelombang elektromagnetik yang sampai ke permukaan bumi.", "B. Gangguan atmosfer yang menyerap cahaya matahari.", "C. Gelombang elektromagnetik yang dipantulkan atau dikembalikan oleh permukaan bumi.", "D. Sinyal digital yang dikirim dari stasiun bumi ke satelit."], kunci_jawaban: "C. Gelombang elektromagnetik yang dipantulkan atau dikembalikan oleh permukaan bumi." },

    { kategori: "Minggu 1 Pendahuluan", tipe: "pg", pertanyaan: "Apa perbedaan mendasar antara Citra PJ dan Peta dalam hal kandungan informasinya?", pilihan: ["A. Citra informasinya terpilih, Peta informasinya lengkap.", "B. Citra informasinya lengkap (apa adanya), Peta informasinya terpilih (simbolik).", "C. Citra hanya untuk navigasi, Peta untuk analisis ilmiah.", "D. Keduanya memiliki informasi yang sama persis."], kunci_jawaban: "B. Citra informasinya lengkap (apa adanya), Peta informasinya terpilih (simbolik)." },
    { kategori: "Minggu 1 Pendahuluan", tipe: "pg", pertanyaan: "Satelit altimetri digunakan dalam oseanografi untuk mengamati...", pilihan: ["A. Kelimpahan klorofil-a.", "B. Suhu permukaan laut (SST).", "C. Topografi permukaan laut (sea surface topography).", "D. Tumpahan minyak di pelabuhan."], kunci_jawaban: "C. Topografi permukaan laut (sea surface topography)." },

    { kategori: "Minggu 1 Pendahuluan", tipe: "pg", pertanyaan: "Berdasarkan kurva reflektansi, objek air memiliki nilai pantulan yang sangat rendah pada panjang gelombang...", pilihan: ["A. Cahaya Tampak (Visible)", "B. Ultra Violet", "C. Inframerah", "D. Gelombang Radio"], kunci_jawaban: "C. Inframerah" },
    { kategori: "Minggu 1 Pendahuluan", tipe: "pg", pertanyaan: "Interpretasi citra yang menggunakan bantuan komputer untuk melakukan klasifikasi disebut interpretasi...", pilihan: ["A. Visual", "B. Digital", "C. Terestrial", "D. Manual"], kunci_jawaban: "B. Digital" },
    { kategori: "Minggu 1 Pendahuluan", tipe: "pg", pertanyaan: "Apa jenis proyeksi yang umumnya dimiliki oleh citra satelit/foto udara?", pilihan: ["A. Ortogonal", "B. Central", "C. Silinder", "D. Kerucut"], kunci_jawaban: "B. Central" },
    { kategori: "Minggu 1 Pendahuluan", tipe: "pg", pertanyaan: "Kemampuan satelit merekam daerah yang sama secara periodik (Time Series) sangat berguna untuk...", pilihan: ["A. Mengukur salinitas harian.", "B. Memantau perubahan garis pantai atau deforestasi.", "C. Menentukan koordinat kapal secara real-time.", "D. Menghitung kedalaman palung."], kunci_jawaban: "B. Memantau perubahan garis pantai atau deforestasi." },

    { kategori: "Minggu 1 Pendahuluan", tipe: "pg", pertanyaan: "Objek vegetasi memiliki ciri khas pada grafik pantulan, yaitu terjadi lonjakan (peak) pada spektrum...", pilihan: ["A. Biru", "B. Merah", "C. Inframerah", "D. Gelombang Mikro"], kunci_jawaban: "C. Inframerah" },
    { kategori: "Minggu 1 Pendahuluan", tipe: "esai", pertanyaan: "Sebutkan 7 komponen penginderaan jauh sesuai materi!", kunci_jawaban: "1. Sumber cahaya matahari, 2. Ei (Incoming), 3. Objek, 4. ER (Reflect), 5. Sensor, 6. Stasiun penerima/pengolah, 7. Pengguna." },
    { kategori: "Minggu 1 Pendahuluan", tipe: "esai", pertanyaan: "Jelaskan apa yang dimaksud dengan pandangan Sinoptik!", kunci_jawaban: "Kemampuan untuk melihat bentangan lahan atau wilayah yang sangat luas dalam sekali pandang." },

    { kategori: "Minggu 1 Pendahuluan", tipe: "esai", pertanyaan: "Apa kegunaan sensor 'Active Microwave' (Radar) di laut?", kunci_jawaban: "Menganalisis kekasaran permukaan laut, river plumes, tumpahan minyak, es laut, dan eddy skala kecil/menengah." },
    { kategori: "Minggu 1 Pendahuluan", tipe: "esai", pertanyaan: "Mengapa air memiliki pantulan rendah pada spektrum inframerah?", kunci_jawaban: "Karena air bersifat menyerap (absorpsi) hampir seluruh energi pada panjang gelombang inframerah." },
    { kategori: "Minggu 1 Pendahuluan", tipe: "esai", pertanyaan: "Sebutkan 4 parameter oseanografi yang bisa diamati satelit!", kunci_jawaban: "Ocean color (klorofil), SST (suhu), Sea surface topography (altimetri), dan Sea-surface roughness (radar)." },
    { kategori: "Minggu 1 Pendahuluan", tipe: "esai", pertanyaan: "Apa perbedaan interpretasi visual dan digital?", kunci_jawaban: "Visual menggunakan citra cetak dan kognisi manusia, digital menggunakan data digital dan klasifikasi komputer." },
    { kategori: "Minggu 1 Pendahuluan", tipe: "esai", pertanyaan: "Jelaskan manfaat fitur 'Time Series' pada satelit!", kunci_jawaban: "Dapat merekam ulang daerah yang sama dalam jangka waktu tertentu untuk memantau perubahan lingkungan." },
    { kategori: "Minggu 1 Pendahuluan", tipe: "esai", pertanyaan: "Sebutkan 2 platform penginderaan jauh selain satelit!", kunci_jawaban: "Pesawat udara, balon stratosfer, roket, helikopter, atau boom." },

    // === MINGGU 2: REVIEW OSEANOGRAFI ===
    { kategori: "Minggu 2 Review Oseanografi", tipe: "pg", pertanyaan: "Berapakah rata-rata kedalaman samudera di dunia berdasarkan data review oseanografi?", pilihan: ["A. 2.500 meter", "B. 3.730 meter", "C. 4.500 meter", "D. 5.120 meter"], kunci_jawaban: "B. 3.730 meter" },

let soalAktif = [], indeksSoal = 0, jawabanUser = [];

function initMenu() {
    const container = document.getElementById('menu-container');
    container.innerHTML = ''; 
    const kategoriUnik = [...new Set(databaseSoal.map(s => s.kategori))];
    kategoriUnik.forEach(k => {
        const btn = document.createElement('button');
        btn.className = 'btn-outline';
        btn.innerText = k;
        btn.onclick = () => startQuiz(k);
        container.appendChild(btn);
    });
}

function startQuiz(k) {
    if (k === 'Semua Topik') {
        soalAktif = [...databaseSoal];
    } else {
        soalAktif = databaseSoal.filter(s => s.kategori === k);
    }
    
    indeksSoal = 0; 
    jawabanUser = new Array(soalAktif.length).fill(""); 
    document.getElementById('home-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'none'; 
    document.getElementById('quiz-screen').style.display = 'block';
    document.getElementById('current-category-text').innerText = k;
    renderSoal();
}

function renderSoal() {
    const s = soalAktif[indeksSoal];
    document.getElementById('question-counter').innerText = `Soal ${indeksSoal + 1} / ${soalAktif.length}`;
    document.getElementById('progress-bar').style.width = `${((indeksSoal + 1) / soalAktif.length) * 100}%`;
    document.getElementById('question-text').innerText = s.pertanyaan;
    
    const container = document.getElementById('answer-container');
    container.innerHTML = '';

    if (s.tipe === 'esai') {
        const txt = document.createElement('textarea');
        txt.className = 'essay-input';
        txt.placeholder = "Ketik jawaban Anda di sini...";
        txt.value = jawabanUser[indeksSoal];
        txt.oninput = (e) => { jawabanUser[indeksSoal] = e.target.value; };
        container.appendChild(txt);
    } else {
        const div = document.createElement('div'); 
        div.className = 'options-list';
        s.pilihan.forEach(o => {
            const lbl = document.createElement('label'); 
            lbl.className = 'option-item' + (jawabanUser[indeksSoal] === o ? ' selected' : '');
            lbl.innerHTML = `<input type="radio" name="opt" ${jawabanUser[indeksSoal] === o ? 'checked' : ''}> ${o}`;
            lbl.onclick = () => {
                jawabanUser[indeksSoal] = o;
                renderSoal(); 
            };
            div.appendChild(lbl);
        });
        container.appendChild(div);
    }

    document.getElementById('btn-prev').style.display = indeksSoal === 0 ? 'none' : 'block';
    
    if (indeksSoal === soalAktif.length - 1) {
        document.getElementById('btn-next').style.display = 'none';
        document.getElementById('btn-lihat-hasil').style.display = 'block';
    } else {
        document.getElementById('btn-next').style.display = 'block';
        document.getElementById('btn-lihat-hasil').style.display = 'none';
    }
    window.scrollTo(0, 0);
}

function nextQuestion() { 
    if (indeksSoal < soalAktif.length - 1) { 
        indeksSoal++; 
        renderSoal(); 
    } 
}

function prevQuestion() { 
    if (indeksSoal > 0) { 
        indeksSoal--; 
        renderSoal(); 
    } 
}

function showResults() {
    const belum = jawabanUser.filter(j => j === "").length;
    if (belum > 0) {
        if (!confirm(`Masih ada ${belum} soal belum diisi. Lihat hasil sekarang?`)) return;
    }

    document.getElementById('quiz-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'block';
    
    let skor = 0;
    const rev = document.getElementById('review-container'); 
    const nav = document.getElementById('nav-grid');
    rev.innerHTML = '';
    nav.innerHTML = '';
    
    soalAktif.forEach((s, i) => {
        const u = jawabanUser[i];
        const cardId = `card-q-${i}`;
        const displayUser = u === "" ? "<span style='color:orange'>(Belum dikerjakan)</span>" : u;
        const card = document.createElement('div'); 
        card.className = 'review-card';
        card.id = cardId;
        
        let statusClass = 'nav-essay';
        let isCorrect = false;
        
        if (s.tipe === 'pg') {
            isCorrect = (u === s.kunci_jawaban);
            statusClass = isCorrect ? 'nav-correct' : 'nav-wrong';
            if (isCorrect) {
                skor++;
                card.classList.add('correct-pg');
            } else {
                card.classList.add('wrong-pg');
            }
        }

        // Navigasi Badge
        const navItem = document.createElement('a');
        navItem.className = `nav-item ${statusClass}`;
        navItem.innerText = i + 1;
        navItem.href = `#${cardId}`;
        nav.appendChild(navItem);

        card.innerHTML = `
            <div class="review-q">
                <span style="font-weight:bold">${i+1}. ${s.pertanyaan}</span>
                <span class="review-badge">${s.tipe.toUpperCase()}</span>
            </div>
            <div style="font-size:12px; color:#666; margin-top:10px;">Jawaban Anda:</div>
            <div class="ans-user">${displayUser} ${s.tipe === 'pg' ? (isCorrect ? '<span style="color:green; font-weight:bold"> (Benar)</span>' : '<span style="color:red; font-weight:bold"> (Salah)</span>') : ''}</div>
            <div style="font-size:12px; color:#666; margin-top:10px">Jawaban Benar / Referensi:</div>
            <div class="ans-ref">${s.kunci_jawaban}</div>
        `;
        rev.appendChild(card);
    });
    
    document.getElementById('score-category-name').innerText = document.getElementById('current-category-text').innerText;
    document.getElementById('score-text-total').innerText = `${skor} / ${soalAktif.filter(x=>x.tipe==='pg').length}`;
    window.scrollTo(0,0);
}

initMenu();
</script>
